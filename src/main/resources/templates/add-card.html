<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #764ba2;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #00b894, #00cec9);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        a {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #764ba2;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <form th:action="@{/add}" method="post" th:object="${card}">
        <h2>Add New Word</h2>
        <input type="text" th:field="*{word}" placeholder="Word (e.g. Apple)" required>
        <input type="text" th:field="*{translation}" placeholder="Translation (e.g. Яблоко)" required>
        <button type="submit">Add Card</button>
        <a href="/">Back to Home</a>
    </form>
</body>
</html>
