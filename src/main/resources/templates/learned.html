<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Learned Words</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .list-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:last-child { border-bottom: none; }
        .word-info {
            display: flex;
            flex-direction: column;
        }
        .word { font-weight: 600; color: #333; font-size: 18px; }
        .translation { color: #666; font-size: 14px; }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .back-btn {
            display: block;
            width: 150px;
            margin: 30px auto 0;
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
            font-weight: 600;
        }
        .back-btn:hover {
            background: white;
            color: #764ba2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>Words I Have Learned</h1>
    <div class="list-container">
        <ul th:if="${!cards.isEmpty()}">
            <li th:each="card : ${cards}">
                <div class="word-info">
                    <span class="word" th:text="${card.word}">Word</span>
                    <span class="translation" th:text="${card.translation}">Translation</span>
                </div>
                <form th:action="@{/learned/delete/{id}(id=${card.id})}" method="post" style="margin: 0;">
                    <button type="submit" class="delete-btn">Remove</button>
                </form>
            </li>
        </ul>
        <p th:if="${cards.isEmpty()}" style="text-align: center; color: #666;">You haven't learned any words yet.</p>
    </div>
    <a href="/" class="back-btn">Back to Learning</a>
</body>
</html>
